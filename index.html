<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anamnese: Diagnóstico do Seu Negócio</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 15px;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .logo {
            width: 160px;
            height: 160px;
            object-fit: contain;
        }

        h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 1.8rem;
        }

        .progress-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            position: relative;
        }
        
        .progress-container::before {
            content: "";
            background-color: #e2e8f0;
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 4px;
            width: 100%;
            z-index: 1;
        }

        .progress-bar {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            height: 4px;
            width: 0%;
            background-color: var(--primary-color);
            z-index: 1;
            transition: width 0.4s ease;
        }

        .step-indicator {
            width: 30px;
            height: 30px;
            background-color: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            color: #64748b;
            z-index: 2;
            transition: all 0.4s ease;
        }

        .step-indicator.active {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.2);
        }

        .step-indicator.completed {
            background-color: #10b981;
            color: white;
        }

        .instructions {
            background-color: #eff6ff;
            border-left: 4px solid var(--primary-color);
            padding: 20px;
            border-radius: 4px;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .instructions p { margin: 0 0 10px 0; }
        .instructions ul { margin: 0 0 15px 0; padding-left: 20px; }
        .instructions li { margin-bottom: 8px; }
        .instructions .final-note { margin-bottom: 0; font-weight: 500; }

        .form-step {
            display: none;
            opacity: 0;
            transform: translateX(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .form-step.active {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 1.15rem;
            color: var(--primary-color);
            margin-top: 0;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-counter {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: normal;
            float: right;
            text-transform: none;
        }

        .form-field { margin-bottom: 15px; }
        .form-field label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
        .form-field input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        .form-field input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); }

        .question-group { margin-bottom: 20px; }
        .checkbox-label { display: flex; align-items: flex-start; cursor: pointer; font-weight: 500; }
        .checkbox-label input[type="checkbox"] { margin-top: 5px; margin-right: 12px; transform: scale(1.1); }
