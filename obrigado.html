<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado! - Diagnóstico Recebido</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .success-container {
            max-width: 550px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
            padding: 40px 30px;
            box-sizing: border-box;
        }

        .success-icon {
            font-size: 60px;
            color: #10b981;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-color);
            margin: 0 0 15px 0;
            font-size: 1.8rem;
        }

        p {
            font-size: 1.05rem;
            color: #475569;
            margin: 0 0 35px 0;
        }

        .step-subtitle {
            font-size: 0.95rem;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            background-color: #25D366;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            background-color: #1ebd58;
        }

        .btn-whatsapp:active {
            transform: scale(0.98);
        }

        .whatsapp-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
    </style>
</head>
<body>

<div class="success-container">
    <div class="success-icon">✓</div>
    <h1>Formulário Enviado com Sucesso!</h1>
    <p>Obrigado por responder ao diagnóstico. Suas respostas já foram processadas pelo nosso sistema.</p>
    
    <div class="step-subtitle">Clique para confirmar os próximos passos no whatsapp</div>
